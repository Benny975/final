<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HellYeah-Contact</title>
    <link rel="stylesheet" href="contact.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="#top"></div>
    <nav class="nav">
      <div>
        <a class="logo" href="index.html">Hell<span>Yeah</span></a>
      </div>

      <div>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="destinations.html">Destinations</a></li>
          <li id="current-location"><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>
    <div class="hero">
      <h1>Get in Touch</h1>
      <div class="container">
        <form action="https://formspree.io/f/xojypvkq" method="POST">
          <div class="input">
            <input type="hidden" name="_next" value="https://github.com/Benny-Oush/final-css-project/blob/main/message.html">

            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              required
            />
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your Email"
              required
            />
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Your message..."
            ></textarea>

            <button type="submit">Send Message</button>
          </div>
        </form>

        <div class="contact-info">
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
              <h4>Our Crypt</h4>
              <p>666 Abyss Way, Underworld City, HELL 1234</p>
            </div>
          </div>
          <div class="info-item">
            <i class="fas fa-phone"></i>
            <div>
              <h4>Summon Us</h4>
              <p>+1 (234) 666-0666</p>
            </div>
          </div>
          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <div>
              <h4>Ghost Mail</h4>
              <p>damnation@hellyeah.com</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="social-and-rights">
      <div class="info">
        <h3>HellYeah</h3>
        <p>@ 2026 Eternal Sojourns. All rights reserved.</p>
      </div>

      <div class="bott-icons">
        <a href="#top" class="icon-link"><i class="fab fa-facebook-f"></i></a>
        <a href="#top" class="icon-link"><i class="fab fa-instagram"></i></a>
        <a href="#top" class="icon-link"><i class="fab fa-twitter"></i></a>
      </div>
    </div>
  </body>
</html>
